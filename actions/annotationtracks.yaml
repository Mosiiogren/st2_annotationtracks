---
name: annotationtracks
enabled: True
description: Creates annotation trackfiles from the cluster data
runner_type: python-script
entry_point: annotationtracks.py
parameters:
  clusteringdata:
    type: string
    description: Path to where the clusters has been stored
    default: "{{ config_context.outputfileclusters }}"
    immutable: True
    position: 0
  outputfolder:
    type: string
    description: Path to where the annotationtracks should be stored
    default: "{{ config_context.outputfolderannotationtracks }}"
    immutable: True
    position: 1
