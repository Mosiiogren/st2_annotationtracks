name: annotationtracks
enabled: True
description: Creates annotation trackfiles from the clustereddata
runner_type: python-script
entry_point: annotationtracks.py
parameters:
  clusteringdata:
    type: string
    description: Path to where the clusters has been stored
    default: "/storage/refrencedata/clusters.json"
    position: 0
  outputfolder:
    type: string
    description: Path to where the annotationtracks should be stored
    default: "/storage/annotationtracks/"
    position: 1
