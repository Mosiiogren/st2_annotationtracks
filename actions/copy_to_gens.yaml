name: copy_to_gens
enabled: True
description: Copy the annotationtracks into the Gens container
runner_type: remote-shell-script
entry_point: copy_to_gens.sh
parameters:
  hosts:
    default: "localhost"
  cwd:
    type: string
    description: Path to where the docker compose file is positioned
    required: True
  annotationtracks:
    type: object
    description: CSV file containing the annotationtracks
    required: True
    position: 0
  gensfolder:
    type: string
    description: Path to the data folder in the Gens container
    required: True
    position: 1
