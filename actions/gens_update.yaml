---
name: gens_update
enabled: True
description: Upload annotationtracks to Gens
runner_type: remote-shell-script
entry_point: gens_update.sh
parameters:
  hosts:
    description: The server the command is running at
    type: string
    default: "{{ config_context.hosts }}"
    immutable: True
  cwd:
    description: Path to the folder containing the variants
    type: string
    default: "{{ config_context.cwd }}"
    immutable: True
  annnotationtracks:
    type: array
    description: List containing the annotationtrackfiles that is being uploaded to Gens
    position: 0


    
    
