
name: gens_update
enabled: True
description: Docker commando for Gens
runner_type: remote-shell-script
entry_point: gens_update.sh
parameters:
  hosts:
    default: "localhost"
  cwd:
    type: string
    description: Path to where the docker compose file is positioned
    required: True
  dockercommand:
    type: string
    description: Docker command to be executed
    default: "logs"
    position: 0
  mongocommand:
    type: string
    description: Mongo command to be executed
    default: "show dbs"
    required: false
    position: 1
  inputfirst:
    type: string
    description: Input
    required: false
    position: 2
  inputsecond:
    type: string
    description: Input
    required: false
    position: 3

    
    
