
name: gens_update
enabled: True
description: Upload annotationtracks to Gens
runner_type: remote-shell-script
entry_point: gens_update.sh
parameters:
  hosts:
    type: string
    description: Host to where the Gens docker has been started at
    required: True
  cwd:
    type: string
    description: Path to where the Gens docker compose file is positioned
    required: True
  annnotationtracks:
    type: array
    description: List containing the annotationtrackfiles that is being uploaded to Gens
    position: 0


    
    
