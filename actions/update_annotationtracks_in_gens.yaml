---
name: update_annotationtracks_in_gens
pack: st2_annotationtracks
description: Workflow to create and update annotationtracks in Gens
runner_type: orquesta
entry_point: workflows/update_annotationtracks_in_gens.yaml
enabled: true


parameters:
  hosts:
    description: The server the command is running at
    type: string
    default: "{{ config_context.hosts }}"
  cwd:
    description: Path to the folder containing the variants
    type: string
    default: "{{ config_context.cwd }}"
  variantfilename:
    description: The filepath to the file containing the variants
    type: string
    default: "data/dumps/annotationtracks.json"
  genefile:
    description: Link to the gene data at Ensemble, information seen at https://ftp.ensembl.org/pub/release-113/gtf/homo_sapiens/README
    type: string
    default: "https://ftp.ensembl.org/pub/release-113/gtf/homo_sapiens/Homo_sapiens.GRCh38.113.gtf.gz"
  MANEfile:
    description: Link to the MANE data at Ensemble, information seen at https://ftp.ncbi.nlm.nih.gov/refseq/MANE/MANE_human/release_1.4/README.txt
    type: string
    default: "https://ftp.ncbi.nlm.nih.gov/refseq/MANE/MANE_human/release_1.4/MANE.GRCh38.v1.4.summary.txt.gz"
  regulatoryfile:
    description: Link to the regulatory data at Ensemble, information seen at https://ftp.ensembl.org/pub/release-113/regulation/homo_sapiens/README.md
    type: string
    default: "https://ftp.ensembl.org/pub/release-113/regulation/homo_sapiens/GRCh38/annotation/Homo_sapiens.GRCh38.regulatory_features.v113.gff3.gz"

 

  
  
