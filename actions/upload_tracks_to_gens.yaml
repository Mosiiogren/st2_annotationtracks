---
name: upload_tracks_to_gens
enabled: True
description: Upload the annotation trackfiles to Gens
runner_type: remote-shell-script
entry_point: upload_tracks_to_gens.sh
parameters:
  hosts:
    description: The server the command is running at
    type: string
    default: "{{ config_context.hosts }}"
  cwd:
    description: Path to the folder containing the variants
    type: string
    default: "{{ config_context.cwd }}"
  annnotationtracks:
    type: array
    description: List containing the annotationtracks that is being uploaded to Gens
    required: True
    position: 0
  outputfolder:
    type: string
    description: Path to the folder where the annotationtracks are being stored
    default: "{{ config_context.outputfolderannotationtracks }}"
    position: 1

