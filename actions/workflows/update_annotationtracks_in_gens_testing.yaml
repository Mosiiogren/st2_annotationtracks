version: 1.0
name: update_annotationtracks_in_gens_testing
description: Workflow to create annotationtracks and update the existing annotationtracks in Gens
input:
  - hosts
  - cwd
  - genedata
  - MANEdata
  - regulatorydata

vars:
  - hosts:
  - cwd:
  - variantfilename:
  - variantfile:
  - variantdata:

tasks:
  open_variant_file:
    action: core.remote
    input: 
      hosts: <% ctx().hosts %>
      cwd: <% ctx().cwd %>
      cmd: head -1 <% ctx().variantfilename %>
    next:
      - when: "{{ succeeded() }}"
      - publish:
          variantfile: <% result().output.stdout %>
      - do:
          get_variant_data
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure

  get_variant_data:
    action: st2_annotationtracks.variant_data
    input:
      variantfile: <% ctx().variantfile %> 
    next:
      - when: "{{ succeeded() }}"
      - publish:
          variantdata: <% result().stdout %>
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure


  report_failure:
    action: core.noop
