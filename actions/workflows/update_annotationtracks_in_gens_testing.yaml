version: 1.0
name: update_annotationtracks_in_gens_testing
description: Workflow to create annotationtracks and update the existing annotationtracks in Gens
input:
  - hosts
  - cwd
  - variantfilename:

vars:
  - hosts:
  - cwd:
  - variantfile:
  - variantdata:

tasks:
  open_variant_file:
    action: core.remote
    input: 
      hosts: <% ctx().hosts %>
      cwd: <% ctx().cwd %>
      cmd: "echo jq \"[. | {variant_type: .variant_type, institute: .institute, category: .category, start: .position, end: .end, length: .length, chromosome: .chromosome, end_chromosome: .end_chrom,  sub_category: .sub_category} | select(.category == \"snv\")]\" <% ctx().variantfilename %>"
   
