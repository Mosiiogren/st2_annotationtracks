version: 1.0
name: update_annotationtracks_in_gens_testing
description: Workflow to create annotationtracks and update the existing annotationtracks in Gens
input:
  - hosts
  - cwd
  - variantfilename

vars:
  - hosts:
  - cwd:
  - variantfile:

tasks:
  open_variant_file:
    action: core.remote
    input: 
      hosts: <% ctx().hosts %>
      cwd: <% ctx().cwd %>
      cmd: "jq \". | {variant_type: .variant_type, institute: .institute, category: .category, start: .position, end: .end, length: .length, chromosome: .chromosome, end_chromosome: .end_chrom,  sub_category: .sub_category} |select(.start==76149560)\" <% ctx().variantfilename %>"
   next:
    - when: "{{ succeeded() }}"
      publish:
        - variantfile: <% result().stdout
    - when: "{{ failed() }}"
      publish:
        - msg: "{{ result() }}"
      do:
        - report_failure

   report_failure:
    action: core.noop
